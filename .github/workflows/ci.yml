name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check service/src/ sdk/src/

      - name: Ruff format check
        run: uv run ruff format --check service/src/ sdk/src/

  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDK with dev deps
        run: cd sdk && uv sync --extra dev

      - name: Run tests with coverage
        run: cd sdk && uv run pytest -q --cov=sentinel_auth --cov-report=xml

  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan service dependencies
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: service/
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan SDK dependencies
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: sdk/
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build service image
        run: |
          cp uv.lock service/uv.lock
          docker build -t daikon/sentinel-auth:ci service/

      - name: Scan container image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: daikon/sentinel-auth:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  admin-container-scan:
    name: Admin Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build admin image
        run: docker build -t daikon/sentinel-admin:ci admin/

      - name: Scan admin container image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: daikon/sentinel-admin:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
