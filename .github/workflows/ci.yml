name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --extra dev
          cd service && uv sync

      - name: Ruff lint
        run: uv run ruff check service/src/ sdk/src/

      - name: Ruff format check
        run: uv run ruff format --check service/src/ sdk/src/

  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan service dependencies
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: service/
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan SDK dependencies
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: sdk/
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build service image
        run: docker build -t daikon-identity-service:ci service/

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: daikon-identity-service:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
