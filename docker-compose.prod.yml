# Sentinel Auth — Production Docker Compose
#
# Prerequisites:
#   1. Generate JWT keys:
#      mkdir -p keys
#      openssl genrsa -out keys/private.pem 2048
#      openssl rsa -in keys/private.pem -pubout -out keys/public.pem
#
#   2. Create .env.prod from the template below and fill in all values.
#
#   3. Run:
#      docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - sentinel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sentinel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  sentinel:
    image: ${SENTINEL_IMAGE:-ghcr.io/sidxz/sentinel:latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BASE_URL: ${BASE_URL}
      ADMIN_URL: ${ADMIN_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}  # base origins only; client app origins are loaded from DB
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      COOKIE_SECURE: "true"
      DEBUG: "false"
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      # OAuth providers (uncomment as needed)
      # GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      # GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      # ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      # ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      # ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SERVICE_API_KEYS: ${SERVICE_API_KEYS:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    secrets:
      - jwt_private_key
      - jwt_public_key
    ports:
      - "${SENTINEL_PORT:-9003}:9003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

secrets:
  jwt_private_key:
    file: ./keys/private.pem
  jwt_public_key:
    file: ./keys/public.pem

volumes:
  pg_data:
  redis_data:

networks:
  sentinel:
    driver: bridge
